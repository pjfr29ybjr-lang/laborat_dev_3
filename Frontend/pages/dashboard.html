<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chley Weather - Dashboard</title>
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/neumorphism.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body class="dashboard-page">
    
    <button id="theme-toggle" class="btn-theme-float">🌓</button>

    <main id="page-main" class="container">
        <div class="loader-container">
            <div class="spinner"></div>
            <p>A carregar o sistema...</p>
        </div>
    </main>

    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/language.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/weather.js"></script>
    <script src="../assets/js/favorites.js"></script>
    <script src="../assets/js/export.js"></script>
    <script src="../assets/js/dashboard.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Inicializa o tema salvo
            if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
            
            // Verifica se o utilizador está logado
            if(!Auth.isAuthenticated()) {
                window.location.href = '../../index.html';
                return;
            }

            // Executa o render do teu módulo profissional
            Dashboard.render();
        });
    </script>
</body>
</html>
