<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — WeatherPro</title>
  
  <!-- Reaproveitando as fontes e estilos do login -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/neumorphism.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">

  <style>
    .dash-layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Barra Superior */
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--bg-card);
      padding: 0.5rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .btn-logout {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-weight: 600;
    }

    /* Busca Estilizada */
    .search-box {
      position: relative;
      max-width: 500px;
      margin: 0 auto 3rem;
    }

    .search-input {
      width: 100%;
      padding: 1.2rem 1.5rem 1.2rem 3.5rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      box-shadow: var(--shadow-neu-in);
      font-size: 1rem;
      color: var(--text-primary);
    }

    .search-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
    }

    /* Card Principal */
    .main-weather-card {
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: white;
      border-radius: 32px;
      padding: 3rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      box-shadow: 0 20px 40px rgba(26,115,232,0.3);
      margin-bottom: 3rem;
    }

    .temp-big {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      margin: 1rem 0;
    }

    /* Previsão 5 dias */
    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
    }

    .forecast-card {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 24px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-neu-sm);
      transition: transform 0.3s;
    }

    .forecast-card:hover { transform: translateY(-5px); }

    @media (max-width: 768px) {
      .main-weather-card { grid-template-columns: 1fr; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="dash-layout">
    <header class="dash-header">
      <div class="brand">
        <span style="font-size: 1.5rem;">🌤️</span>
        <strong style="font-family: 'Sora'; margin-left: 0.5rem;">WeatherPro</strong>
      </div>
      
      <div class="user-info">
        <span id="display-user-name">Carregando...</span>
        <button class="btn-logout" onclick="App.logout()">Sair</button>
      </div>
    </header>

    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="city-search" placeholder="Pesquise por uma cidade (ex: Luanda)">
    </div>

    <section class="main-weather-card" id="current-weather">
      <div>
        <h2 id="city-name" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Cidade</h2>
        <p id="current-date">Sexta, 24 de Maio</p>
        <div class="temp-big" id="main-temp">--°C</div>
        <p id="weather-desc" style="font-size: 1.2rem; text-transform: capitalize;">Carregando dados...</p>
      </div>
      
      <div style="background: rgba(255,255,255,0.1); border-radius: 20px; padding: 2rem; display: flex; flex-direction: column; justify-content: center; gap: 1rem;">
        <div>💧 Humidade: <strong id="humidity">--%</strong></div>
        <div>🌬️ Vento: <strong id="wind">-- km/h</strong></div>
        <div>🌡️ Sensação: <strong id="feels-like">--°C</strong></div>
      </div>
    </section>

    <h3 style="margin-bottom: 1.5rem; font-family: 'Sora';">Previsão para 5 dias</h3>
    <div class="forecast-grid" id="forecast-container">
      <!-- Cards serão inseridos aqui via JS -->
    </div>
  </div>

  <script>
    const App = {
      init() {
        // Proteção de rota
        const user = JSON.parse(localStorage.getItem('ws_user'));
        const token = localStorage.getItem('ws_token');
        
        if (!token || !user) {
          window.location.href = './login.html';
          return;
        }

        document.getElementById('display-user-name').textContent = `Olá, ${user.name.split(' ')[0]}`;
        
        // Listener de busca
        document.getElementById('city-search').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') this.searchWeather(e.target.value);
        });

        // Carga inicial
        this.searchWeather('Luanda');
      },

      async searchWeather(city) {
        // Aqui você chamaria sua API (OpenWeatherMap)
        console.log(`Buscando clima para: ${city}`);
        // Lógica de fetch omitida, mas você usaria o API_BASE definido no login
      },

      logout() {
        localStorage.removeItem('ws_token');
        localStorage.removeItem('ws_user');
        window.location.href = './login.html';
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
