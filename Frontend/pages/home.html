<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chley Weather - Home</title>
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/neumorphism.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
</head>
<body>
    <div id="app">
        <main id="page-main" class="container">
            <div class="page-content page-enter" style="text-align: center; padding-top: 10vh;">
                <div class="neu-card" style="padding: 3rem; display: inline-block; max-width: 600px;">
                    <h1 id="welcome-msg">Bem-vindo ao Chley Weather</h1>
                    <p style="color: var(--text-secondary); margin: 1.5rem 0;">
                        O seu sistema avançado de monitorização meteorológica.
                    </p>
                    
                    <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                        <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">
                            Ir para o Dashboard
                        </button>
                        <button class="btn btn-secondary" id="logout-btn">
                            Terminar Sessão
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/language.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Proteção de Rota
            if (!Auth.isAuthenticated()) {
                window.location.href = '../index.html';
                return;
            }

            // 2. Personalização com o teu nome (A. Rutherford)
            const user = Auth.getUser();
            if (user && user.name) {
                document.getElementById('welcome-msg').innerText = `Bem-vindo, ${user.name.split(' ')[0]}! 👋`;
            }

            // 3. Lógica de Logout
            document.getElementById('logout-btn').onclick = () => {
                Auth.logout();
                window.location.href = '../index.html';
            };
        });
    </script>
</body>
</html>
