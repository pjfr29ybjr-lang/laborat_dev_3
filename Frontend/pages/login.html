<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Chley Weather - Login</title>
    <link rel="stylesheet" href="../style/global.css">
</head>
<body>
    <div id="navbar-container"></div> <main class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <section class="neumorphism" style="width: 100%; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 20px;">Entrar</h2>
            <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;" action="home.html">
                <input type="email" placeholder="Email" class="neumorphism-inset" required>
                <input type="password" placeholder="Palavra-passe" class="neumorphism-inset" required>
                <button type="submit" class="neumorphism-btn">Aceder</button>
                <p style="text-align: center; font-size: 0.9rem;">
                    Não tem conta? <a href="register.html" style="color: var(--accent);">Registe-se</a>
                </p>
            </form>
        </section>
    </main>

    <script type="module" src="/weather-app/frontend/app.js"></script>
</body>
</html>
