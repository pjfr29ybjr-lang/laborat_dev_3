<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Chley Weather - Login</title>
    <link rel="stylesheet" href="../style/global.css">
</head>
<body>
    <main class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <section class="neumorphism" style="width: 100%; max-width: 400px; padding: 30px;">
            <h2 style="text-align: center; margin-bottom: 20px;">Entrar</h2>
            <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="email" id="login-email" placeholder="Email" class="neumorphism-inset" required style="padding: 12px; border: none; border-radius: 8px;">
                <input type="password" id="login-pass" placeholder="Palavra-passe" class="neumorphism-inset" required style="padding: 12px; border: none; border-radius: 8px;">
                <button type="submit" class="neumorphism-btn" style="padding: 12px; font-weight: bold;">Aceder</button>
                 <button id="theme-toggle" class="neumorphism-btn" style="padding: 10px; position: fixed; top: 20px; right: 20px; z-index: 1000;">
    🌓 Modo
</button>
                <p style="text-align: center; font-size: 0.9rem; margin-top: 10px;">
                    Não tem conta? <a href="register.html" style="color: #3498db; text-decoration: none;">Registe-se</a>
                </p>
            </form>
        </section>
    </main>

    <script type="module" src="../app.js"></script>
</body>
</html>
