<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Chley Weather - Registo</title>
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/neumorphism.css">
</head>
<body>
    <div class="auth-container">
        <div class="neu-card" style="max-width: 450px; margin: 50px auto; padding: 2rem;">
            <h2>Criar Conta</h2>
            <form id="register-form">
                <input type="text" id="reg-name" placeholder="Nome Completo" class="form-input" required>
                <input type="email" id="reg-email" placeholder="Email" class="form-input" style="margin-top:1rem" required>
                <input type="password" id="reg-pass" placeholder="Palavra-passe" class="form-input" style="margin-top:1rem" required>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Registar</button>
            </form>
            <a href="../index.html" style="display: block; text-align: center; margin-top: 1rem;">Já tenho conta</a>
        </div>
    </div>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const userData = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-pass').value
            };
            const success = await Auth.register(userData);
            if (success) window.location.href = '../index.html';
        };
    </script>
</body>
</html>
