<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherPro — O Clima em Tempo Real</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/neumorphism.css">

  <style>
    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: radial-gradient(circle at top right, rgba(26,115,232,0.1), transparent),
                  radial-gradient(circle at bottom left, rgba(99,102,241,0.1), transparent);
    }

    .hero-title {
      font-family: 'Sora', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
    }

    .hero-title span {
      background: linear-gradient(135deg, #60a5fa, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-desc {
      max-width: 600px;
      font-size: 1.2rem;
      color: var(--text-secondary);
      margin-bottom: 3rem;
      line-height: 1.6;
    }

    .nav-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Estilo do botão seguindo o padrão do login */
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: #fff;
      padding: 1rem 2.5rem;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(26,115,232,0.3);
      transition: all 0.3s ease;
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      padding: 1rem 2.5rem;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(26,115,232,0.4); }
    .btn-secondary:hover { background: var(--bg-hover); }

    /* Floating Icons */
    .float-icon {
      position: absolute;
      font-size: 3rem;
      z-index: -1;
      opacity: 0.5;
      animation: float 6s ease-in-out infinite;
    }
  </style>
</head>
<body>
  
  <main class="hero">
    <!-- Ícones Decorativos -->
    <div class="float-icon" style="top: 15%; left: 10%;">☀️</div>
    <div class="float-icon" style="bottom: 20%; right: 15%; animation-delay: 2s;">⛈️</div>
    <div class="float-icon" style="top: 20%; right: 10%; animation-delay: 4s;">❄️</div>

    <div class="auth-brand-badge">🌍 WeatherPro — Inteligência Meteorológica</div>
    
    <h1 class="hero-title">
      Sua estação de tempo<br>em <span>qualquer lugar</span>
    </h1>
    
    <p class="hero-desc">
      Acompanhe previsões precisas, humidade, vento e alertas em tempo real com a tecnologia do IPIL Projecto #03.
    </p>

    <div class="nav-buttons">
      <a href="./pages/login.html" class="btn-primary">Entrar na Conta</a>
      <a href="./pages/register.html" class="btn-secondary">Criar Conta Grátis</a>
    </div>

    <!-- Preview Widget -->
    <div class="auth-weather-widget" style="position: relative; margin-top: 4rem; width: 280px; bottom: 0; right: 0;">
      <div class="auth-weather-widget-city">📍 Luanda, AO</div>
      <div style="display:flex;align-items:center;gap:.5rem;">
        <span style="font-size:2.2rem;">🌤️</span>
        <div>
          <div class="auth-weather-widget-temp">29°C</div>
          <div class="auth-weather-widget-desc">Parcialmente nublado</div>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/theme.js"></script>
</body>
</html>
